<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リール台本ジェネレーター｜Pure Shining</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    background: #fdf8f5;
    color: #3a2e2e;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #c98b8b 0%, #e8b4a0 100%);
    color: white;
    padding: 20px;
    text-align: center;
  }
  header h1 { font-size: 18px; font-weight: bold; letter-spacing: 0.05em; }
  header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

  .card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(180,120,100,0.08);
  }
  .card h2 {
    font-size: 14px;
    color: #c98b8b;
    margin-bottom: 12px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card h2::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 16px;
    background: #c98b8b;
    border-radius: 2px;
  }

  /* テーマ選択 */
  .theme-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .theme-btn {
    border: 2px solid #e8d5ce;
    background: white;
    border-radius: 10px;
    padding: 12px 8px;
    cursor: pointer;
    font-size: 13px;
    color: #5a3a3a;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .theme-btn .emoji { font-size: 20px; display: block; margin-bottom: 4px; }
  .theme-btn:hover { border-color: #c98b8b; background: #fdf0ec; }
  .theme-btn.selected { border-color: #c98b8b; background: #fdf0ec; color: #9a4a4a; font-weight: bold; }

  /* スタイル選択 */
  .style-row {
    display: flex;
    gap: 8px;
  }
  .style-btn {
    flex: 1;
    border: 2px solid #e8d5ce;
    background: white;
    border-radius: 8px;
    padding: 10px 4px;
    cursor: pointer;
    font-size: 12px;
    color: #5a3a3a;
    text-align: center;
    transition: all 0.2s;
  }
  .style-btn:hover { border-color: #c98b8b; background: #fdf0ec; }
  .style-btn.selected { border-color: #c98b8b; background: #fdf0ec; color: #9a4a4a; font-weight: bold; }

  /* キーワード入力 */
  input[type="text"], textarea {
    width: 100%;
    border: 1.5px solid #e8d5ce;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: #3a2e2e;
    background: #fdfaf8;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus { border-color: #c98b8b; }
  textarea { height: 70px; resize: vertical; }
  .hint { font-size: 11px; color: #aaa; margin-top: 5px; }

  /* 生成ボタン */
  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, #c98b8b, #e8a898);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    margin-bottom: 20px;
  }
  .generate-btn:hover { opacity: 0.88; }
  .generate-btn:active { opacity: 0.75; }

  /* 出力エリア */
  #output { display: none; }
  .output-section {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(180,120,100,0.08);
  }
  .output-section h3 {
    font-size: 13px;
    color: #c98b8b;
    font-weight: bold;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #f0e0da;
  }

  /* フックカード */
  .hook-cards { display: flex; flex-direction: column; gap: 8px; }
  .hook-card {
    border: 1.5px solid #e8d5ce;
    border-radius: 8px;
    padding: 12px;
    position: relative;
  }
  .hook-card .hook-num {
    font-size: 10px;
    color: #c98b8b;
    font-weight: bold;
    margin-bottom: 4px;
  }
  .hook-card .hook-text {
    font-size: 15px;
    font-weight: bold;
    color: #3a2e2e;
    line-height: 1.6;
  }

  /* 台本 */
  .script-block { margin-bottom: 14px; }
  .script-label {
    font-size: 10px;
    font-weight: bold;
    color: white;
    background: #c98b8b;
    border-radius: 4px;
    padding: 2px 8px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .script-label.telop { background: #9b7ea0; }
  .script-label.voice { background: #c98b8b; }
  .script-time {
    font-size: 10px;
    color: #aaa;
    margin-left: 6px;
  }
  .telop-text {
    background: #1a1a1a;
    color: #fff;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 15px;
    font-weight: bold;
    line-height: 1.6;
    letter-spacing: 0.03em;
  }
  .voice-text {
    background: #fdf8f5;
    border-left: 3px solid #e8b4a0;
    padding: 8px 12px;
    font-size: 14px;
    line-height: 1.8;
    color: #3a2e2e;
  }

  /* テロップまとめ */
  .keyphrase-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .keyphrase-tag {
    background: #fdf0ec;
    border: 1px solid #e8b4a0;
    color: #9a4a4a;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
  }

  /* CTA */
  .cta-box {
    background: linear-gradient(135deg, #fdf0ec, #f9e8e0);
    border-radius: 8px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.8;
    color: #3a2e2e;
  }

  /* コピーボタン */
  .copy-btn {
    background: none;
    border: 1.5px solid #c98b8b;
    color: #c98b8b;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    float: right;
    margin-top: -28px;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: #c98b8b; color: white; }

  /* 再生成 */
  .regen-btn {
    width: 100%;
    background: none;
    border: 2px solid #c98b8b;
    color: #c98b8b;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .regen-btn:hover { background: #c98b8b; color: white; }

  @media (max-width: 400px) {
    .theme-grid { grid-template-columns: 1fr; }
    .style-row { flex-wrap: wrap; }
    .style-btn { flex: 0 0 calc(50% - 4px); }
  }
</style>
</head>
<body>

<header>
  <h1>🌸 リール台本ジェネレーター</h1>
  <p>Pure Shining｜丘咲ともこ</p>
</header>

<div class="container">

  <!-- テーマ選択 -->
  <div class="card">
    <h2>テーマ軸を選ぶ</h2>
    <div class="theme-grid">
      <button class="theme-btn" data-theme="loop" onclick="selectTheme(this)">
        <span class="emoji">🌀</span>
        ネガティブループ<br>
        <small style="color:#999;font-size:11px">落ち込んで自分を責めるループ</small>
      </button>
      <button class="theme-btn" data-theme="outside" onclick="selectTheme(this)">
        <span class="emoji">🔍</span>
        外側に幸せを探す<br>
        <small style="color:#999;font-size:11px">〇〇になれば幸せになれる</small>
      </button>
      <button class="theme-btn" data-theme="kimaguchi" onclick="selectTheme(this)">
        <span class="emoji">😶</span>
        顔色を伺う<br>
        <small style="color:#999;font-size:11px">人の機嫌に振り回される疲れ</small>
      </button>
      <button class="theme-btn" data-theme="habit" onclick="selectTheme(this)">
        <span class="emoji">💬</span>
        アラフィフの口癖<br>
        <small style="color:#999;font-size:11px">知らずに言ってしまう言葉</small>
      </button>
      <button class="theme-btn" data-theme="restart" onclick="selectTheme(this)">
        <span class="emoji">🌱</span>
        どん底からのリスタート<br>
        <small style="color:#999;font-size:11px">人生を変えられた実体験</small>
      </button>
      <button class="theme-btn" data-theme="free" onclick="selectTheme(this)">
        <span class="emoji">✏️</span>
        自由入力<br>
        <small style="color:#999;font-size:11px">下のキーワードで自由に</small>
      </button>
    </div>
  </div>

  <!-- スタイル選択 -->
  <div class="card">
    <h2>台本スタイル</h2>
    <div class="style-row">
      <button class="style-btn selected" data-style="empathy" onclick="selectStyle(this)">
        😢 共感型<br><small style="color:#999;font-size:10px">あなたもそうじゃないですか</small>
      </button>
      <button class="style-btn" data-style="awareness" onclick="selectStyle(this)">
        💡 気づき型<br><small style="color:#999;font-size:10px">実は〇〇だったんです</small>
      </button>
      <button class="style-btn" data-style="list" onclick="selectStyle(this)">
        📋 リスト型<br><small style="color:#999;font-size:10px">3つのパターンで整理</small>
      </button>
    </div>
  </div>

  <!-- キーワード（任意） -->
  <div class="card">
    <h2>キーワード（任意）</h2>
    <input type="text" id="keyword" placeholder="例：感情のループ、パートナーシップ、自己嫌悪">
    <p class="hint">テーマをさらに絞りたいときに入力。空欄でも台本は生成されます。</p>
  </div>

  <button class="generate-btn" onclick="generate()">✨ 台本を生成する</button>

  <!-- 出力エリア -->
  <div id="output">

    <div class="output-section">
      <h3>📌 冒頭テロップ（フック）3パターン</h3>
      <p style="font-size:11px;color:#aaa;margin-bottom:10px">最初の1〜2秒に表示する文字。指で止めさせる一言。</p>
      <div class="hook-cards" id="hooks"></div>
    </div>

    <div class="output-section">
      <h3>🎬 60秒リール台本</h3>
      <p style="font-size:11px;color:#aaa;margin-bottom:12px">
        <span style="background:#9b7ea0;color:white;border-radius:3px;padding:1px 6px;font-size:10px">テロップ</span>
        = 画面に出す文字
        <span style="background:#c98b8b;color:white;border-radius:3px;padding:1px 6px;font-size:10px">ナレーション</span>
        = 話す内容
      </p>
      <div id="script"></div>
    </div>

    <div class="output-section">
      <h3>✍️ テロップ用キーフレーズ</h3>
      <p style="font-size:11px;color:#aaa;margin-bottom:10px">台本の中から特に画面に残したいフレーズ。</p>
      <div class="keyphrase-list" id="keyphrases"></div>
    </div>

    <div class="output-section">
      <h3>📣 CTA文言</h3>
      <div class="cta-box" id="cta"></div>
    </div>

    <button class="regen-btn" onclick="generate()">🔄 別パターンで再生成</button>

  </div>

</div>

<script>
let selectedTheme = '';
let selectedStyle = 'empathy';
let variation = 0;

function selectTheme(btn) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTheme = btn.dataset.theme;
}

function selectStyle(btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedStyle = btn.dataset.style;
}

// ── テンプレートデータ ──────────────────────────────────

        { time: '40〜55秒', telop: '思い込みに気づいて\n自分の土台を整えると\nループから抜けられる', voice: 'その思い込みの根っこに気づいて、自分の内側の土台を整えると、感情のループからちゃんと抜けられます。私自身も、それで変わることができました。' },

    awareness: {

function generate() {
  if (!selectedTheme) {
    alert('テーマ軸を選んでください');
    return;
  }

  variation = (variation + 1) % 3;
  const theme = data[selectedTheme];
  const styleData = theme[selectedStyle] || theme['empathy'];
  const hookIndex = variation;

  // フック
  const hooksEl = document.getElementById('hooks');
  hooksEl.innerHTML = '';
  theme.hooks.forEach((h, i) => {
    const card = document.createElement('div');
    card.className = 'hook-card';
    card.innerHTML = `
      <div class="hook-num">パターン ${i + 1}</div>
      <div class="hook-text">${h.join('<br>')}</div>
    `;
    hooksEl.appendChild(card);
  });

  // 台本
  const scriptEl = document.getElementById('script');
  scriptEl.innerHTML = '';
  styleData.blocks.forEach(b => {
    const div = document.createElement('div');
    div.className = 'script-block';
    div.innerHTML = `
      <div>
        <span class="script-label telop">テロップ</span>
        <span class="script-time">${b.time}</span>
      </div>
      <div class="telop-text" style="white-space:pre-line">${b.telop}</div>
      <div style="height:6px"></div>
      <div><span class="script-label voice">ナレーション</span></div>
      <div class="voice-text">${b.voice}</div>
    `;
    scriptEl.appendChild(div);
  });

  // キーフレーズ
  const kpEl = document.getElementById('keyphrases');
  kpEl.innerHTML = '';
  styleData.keyphrases.forEach(kp => {
    const tag = document.createElement('span');
    tag.className = 'keyphrase-tag';
    tag.textContent = kp;
    kpEl.appendChild(tag);
  });

  // CTA
  document.getElementById('cta').innerHTML = `
    もっと詳しく知りたい方は<br>
    プロフのLINEから<strong>無料体験セッション</strong>のご案内をしています。<br>
    <br>
    LINE ID：<strong>@961lncup</strong><br>
    <br>
    「保存してあとで読み返してみてください」と添えて締めましょう🌸
  `;

  document.getElementById('output').style.display = 'block';
  document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
